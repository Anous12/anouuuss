<style>
  :root{
    --bg: #171a33;
    --bg-2: #12142766;
    --surface: #242a4d;
    --surface-2: #2f3660;
    --line: #3c437a;
    --gold: #e8b84b;
    --gold-dim: #e8b84b33;
    --coral: #e1574c;
    --mint: #4fd1a5;
    --text: #f5f1e8;
    --text-dim: #a8aec7;
    --radius: 20px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 0%, #2b2f5b 0%, transparent 45%),
      radial-gradient(circle at 100% 100%, #1e2247 0%, transparent 50%),
      var(--bg);
    color:var(--text);
    font-family:'Tajawal', sans-serif;
    display:flex;
    justify-content:center;
    padding: 24px 14px 60px;
  }
  .app{ width:100%; max-width:480px; }

  /* header */
  .brand{ text-align:center; margin-bottom:22px; }
  .brand h1{
    font-family:'Cairo', sans-serif; font-weight:900; font-size:2.4rem;
    margin:0; letter-spacing:1px;
    background:linear-gradient(180deg, #fff, var(--gold));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .brand p{ margin:4px 0 0; color:var(--text-dim); font-size:.9rem; }
  .pulse-wrap{ width:160px; height:36px; margin:6px auto 0; opacity:.85; }
  .pulse-line{
    fill:none; stroke:var(--gold); stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round;
    stroke-dasharray: 340; stroke-dashoffset:340;
    animation: draw 2.6s linear infinite;
  }
  @keyframes draw{
    0%{ stroke-dashoffset:340; }
    45%{ stroke-dashoffset:0; }
    100%{ stroke-dashoffset:-340; }
  }

  /* card */
  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:26px 22px;
    box-shadow:0 20px 40px -20px #00000080;
    animation: rise .35s ease both;
  }
  @keyframes rise{ from{ opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;} }

  .eyebrow{
    font-size:.75rem; color:var(--gold); font-weight:700; letter-spacing:.5px;
    display:flex; align-items:center; gap:6px; margin-bottom:6px;
  }
  .eyebrow::before{ content:""; width:6px; height:6px; border-radius:50%; background:var(--gold); display:inline-block; }

  h2.title{ font-family:'Cairo',sans-serif; font-weight:800; font-size:1.35rem; margin:2px 0 16px; line-height:1.5; }

  label{ display:block; font-size:.85rem; color:var(--text-dim); margin-bottom:6px; }
  input[type=text], input[type=number]{
    width:100%; padding:13px 14px; border-radius:12px; border:1px solid var(--line);
    background:var(--surface-2); color:var(--text); font-family:'Tajawal',sans-serif; font-size:1rem;
    outline:none; transition:border-color .15s, box-shadow .15s;
  }
  input:focus{ border-color:var(--gold); box-shadow:0 0 0 3px var(--gold-dim); }

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    width:100%; padding:14px 18px; border-radius:14px; border:none; cursor:pointer;
    font-family:'Cairo',sans-serif; font-weight:800; font-size:1rem; letter-spacing:.3px;
    background:var(--gold); color:#1b1f3b;
    transition:transform .12s ease, filter .12s ease;
    margin-top:14px;
  }
  .btn:hover{ filter:brightness(1.07); transform:translateY(-1px); }
  .btn:active{ transform:translateY(0); }
  .btn:disabled{ opacity:.4; cursor:not-allowed; filter:none; transform:none; }
  .btn.secondary{ background:var(--surface-2); color:var(--text); border:1px solid var(--line); }
  .btn.ghost{ background:transparent; color:var(--text-dim); border:1px dashed var(--line); }
  .btn.small{ width:auto; padding:8px 14px; font-size:.8rem; margin-top:0; }

  .row{ display:flex; gap:10px; }
  .row > *{ flex:1; }

  .player-chip{
    display:flex; align-items:center; justify-content:space-between;
    background:var(--surface-2); border:1px solid var(--line); border-radius:12px;
    padding:10px 14px; margin-bottom:8px; font-weight:500;
  }
  .player-chip .num{ color:var(--gold); font-weight:800; margin-left:8px; font-family:'Cairo',sans-serif; }
  .player-chip button{
    background:none; border:none; color:var(--coral); font-size:1.1rem; cursor:pointer; line-height:1;
  }

  .chips{ display:flex; flex-wrap:wrap; gap:8px; margin:10px 0 4px; }
  .chip-opt{
    padding:9px 16px; border-radius:999px; border:1px solid var(--line); background:var(--surface-2);
    color:var(--text-dim); cursor:pointer; font-size:.85rem; font-weight:700; transition:.15s;
  }
  .chip-opt.active{ background:var(--gold); color:#1b1f3b; border-color:var(--gold); }

  /* pass device screen */
  .pass-screen{ text-align:center; padding:38px 22px; }
  .pass-avatar{
    width:76px; height:76px; border-radius:50%; margin:0 auto 18px;
    background:linear-gradient(160deg, var(--gold), #b9862c);
    display:flex; align-items:center; justify-content:center;
    font-family:'Cairo',sans-serif; font-weight:900; font-size:1.7rem; color:#1b1f3b;
  }
  .pass-screen h3{ font-family:'Cairo',sans-serif; font-size:1.3rem; margin:0 0 6px; }
  .pass-screen p{ color:var(--text-dim); margin:0 0 4px; font-size:.9rem; }

  /* question stage */
  .qbox{
    background:var(--surface-2); border:1px solid var(--line); border-radius:16px;
    padding:20px; text-align:center; margin-bottom:18px;
  }
  .qbox .cat{ font-size:.75rem; color:var(--gold); font-weight:700; margin-bottom:8px; }
  .qbox .qtext{ font-family:'Cairo',sans-serif; font-weight:800; font-size:1.15rem; line-height:1.6; }

  .progress{ display:flex; gap:5px; margin-bottom:16px; }
  .progress span{ flex:1; height:5px; border-radius:3px; background:var(--surface-2); }
  .progress span.done{ background:var(--gold); }

  .answer-card{
    border:1px solid var(--line); background:var(--surface-2); border-radius:14px;
    padding:15px 16px; margin-bottom:10px; cursor:pointer; transition:.15s; font-weight:500;
    animation: flipin .4s ease both;
  }
  .answer-card:hover{ border-color:var(--gold); transform:translateY(-1px); }
  .answer-card.picked{ border-color:var(--gold); background:var(--gold-dim); }
  .answer-card.correct{ border-color:var(--mint); background:#4fd1a51f; }
  .answer-card.wrong-picked{ border-color:var(--coral); background:#e1574c1f; }
  .answer-card .meta{ font-size:.75rem; color:var(--text-dim); margin-top:6px; }
  @keyframes flipin{
    from{ opacity:0; transform:rotateX(35deg) translateY(6px); }
    to{ opacity:1; transform:none; }
  }

  .score-row{
    display:flex; justify-content:space-between; align-items:center;
    padding:12px 14px; background:var(--surface-2); border:1px solid var(--line);
    border-radius:12px; margin-bottom:8px;
  }
  .score-row .name{ font-weight:700; }
  .score-row .pts{ font-family:'Cairo',sans-serif; font-weight:900; color:var(--gold); }
  .score-row.leader{ border-color:var(--gold); box-shadow:0 0 0 1px var(--gold) inset; }
  .score-row .delta{ font-size:.75rem; color:var(--mint); margin-right:6px; }

  .footer-note{ text-align:center; color:var(--text-dim); font-size:.75rem; margin-top:18px; }
  .trophy{ font-size:2.4rem; text-align:center; margin-bottom:6px; }
</style>
</head>

function buildGeoQuestions(){
  const list = [];
  COUNTRY_CAPITAL.forEach(([country, capital])=>{
    if(country===capital) return;
    list.push({cat:"جغرافيا", q:`ما عاصمة ${country}؟`, a:capital});
    list.push({cat:"جغرافيا", q:`ما اسم الدولة التي عاصمتها ${capital}؟`, a:country});
  });
  COUNTRY_CAPITAL.forEach(([country, capital])=>{
    if(country===capital){
      list.push({cat:"جغرافيا", q:`ما عاصمة ${country}؟`, a:capital});
    }
  });
  return list;
}

function rnd(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }

function buildMathQuestions(){
  const seen = new Set();

  ];

    const t = wordTemplates[rnd(0,wordTemplates.length-1)];

    const [q,a] = t(n,m);
    push(q,a);
  }

  return list;
}

const QUESTIONS = [...CURATED, ...buildGeoQuestions(), ...buildMathQuestions()];

function normalizeAnswer(s){
  return String(s)
    .trim()
    .replace(/[إأآا]/g,'ا')
    .replace(/ى/g,'ي')
    .replace(/[\u064B-\u0652\u0670\u0640]/g,'')
    .replace(/[",.\s]/g,'')
    .toLowerCase();
}

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function uid(){ return Math.random().toString(36).slice(2,9); }

let state = {
  phase:'setup',
  players:[],
  numRounds:6,
  pool:[],
  round:0,
  question:null,
  answerOrder:[],
  answerIdx:0,
  answers:{},
  voteOrder:[],
  voteIdx:0,
  votes:{},
  revealList:[],
  pendingPhase:null,
  pendingPlayerId:null,
  lastScores:{}
};

const stageEl = document.getElementById('stage');
function render(){ stageEl.innerHTML = ''; VIEWS[state.phase](); }

function el(html){
  const t = document.createElement('template');
  t.innerHTML = html.trim();
  return t.content.firstElementChild;
}

/* ---------- SETUP ---------- */
function viewSetup(){
  const card = el(`
    <div class="card">
      <div class="eyebrow">الإعداد</div>
      <h2 class="title">زيدوا اللاعبين وابداو الكذبة</h2>
      <div id="players-list"></div>
      <div class="row" style="margin-top:6px;">
        <input type="text" id="pname" placeholder="اسم اللاعب" maxlength="16">
        <button class="btn small" id="addp" style="flex:0 0 auto;">إضافة</button>
      </div>
      <div style="margin-top:20px;">
        <label>عدد الأسئلة في اللعبة</label>
        <div class="chips" id="round-chips"></div>
      </div>
      <button class="btn" id="startBtn">ابدأ اللعبة</button>
      <div class="footer-note">الحد الأدنى 3 لاعبين · بنك فيه ${QUESTIONS.length}+ سؤال (ثقافة عامة، عواصم، حساب) · مرّروا الجهاز بين بعضكم في كل دور.</div>
    </div>
  `);
  stageEl.appendChild(card);

  function renderPlayers(){
    const list = card.querySelector('#players-list');
    list.innerHTML = '';
    state.players.forEach((p,i)=>{
      const chip = el(`<div class="player-chip"><span><span class="num">${i+1}.</span>${p.name}</span><button data-id="${p.id}">✕</button></div>`);
      chip.querySelector('button').onclick = ()=>{
        state.players = state.players.filter(x=>x.id!==p.id);
        renderPlayers();
      };
      list.appendChild(chip);
    });
  }
  renderPlayers();

  const roundChips = card.querySelector('#round-chips');
  [4,6,8,10,15].forEach(n=>{
    const c = el(`<div class="chip-opt ${n===state.numRounds?'active':''}">${n}</div>`);
    c.onclick = ()=>{
      state.numRounds = n;
      [...roundChips.children].forEach(x=>x.classList.remove('active'));
      c.classList.add('active');
    };
    roundChips.appendChild(c);
  });

  const nameInput = card.querySelector('#pname');
  function addPlayer(){
    const v = nameInput.value.trim();
    if(!v || state.players.length>=8) return;
    state.players.push({id:uid(), name:v, score:0});
    nameInput.value='';
    renderPlayers();
    nameInput.focus();
  }
  card.querySelector('#addp').onclick = addPlayer;
  nameInput.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); addPlayer(); }});

  card.querySelector('#startBtn').onclick = ()=>{
    if(state.players.length<3){
      alert('لازم على الأقل 3 لاعبين باش اللعبة تنجح.');
      return;
    }
    state.pool = shuffle(QUESTIONS).slice(0, state.numRounds);
    state.round = 0;
    state.players.forEach(p=>p.score=0);
    beginRound();
  };
}

/* ---------- ROUND FLOW ---------- */
function beginRound(){
  state.question = state.pool[state.round];
  state.answerOrder = shuffle(state.players.map(p=>p.id));
  state.answerIdx = 0;
  state.answers = {};
  goToPass('answer', state.answerOrder[0]);
}

function goToPass(nextPhase, playerId){
  state.pendingPhase = nextPhase;
  state.pendingPlayerId = playerId;
  state.phase = 'pass';
  render();
}

function viewPass(){
  const player = state.players.find(p=>p.id===state.pendingPlayerId);
  const card = el(`
    <div class="card pass-screen">
      <div class="pass-avatar">${player.name.trim().charAt(0)}</div>
      <h3>مرّر الجهاز إلى ${player.name}</h3>
      <p>سؤال ${state.round+1} من ${state.pool.length}</p>
      <button class="btn" id="ready">أنا جاهز</button>
    </div>
  `);
  stageEl.appendChild(card);
  card.querySelector('#ready').onclick = ()=>{
    state.phase = state.pendingPhase;
    render();
  };
}

function progressBar(current,total){
  let spans='';
  for(let i=0;i<total;i++) spans += `<span class="${i<current?'done':''}"></span>`;
  return `<div class="progress">${spans}</div>`;
}

/* ---------- ANSWER PHASE ---------- */
function viewAnswer(){
  const playerId = state.answerOrder[state.answerIdx];
  const player = state.players.find(p=>p.id===playerId);
  const card = el(`
    <div class="card">
      <div class="eyebrow">${player.name} — اكتب إجابة كاذبة مقنعة</div>
      ${progressBar(state.answerIdx, state.answerOrder.length)}
      <div class="qbox">
        <div class="cat">${state.question.cat}</div>
        <div class="qtext">${state.question.q}</div>
      </div>
      <label>إجابتك (لو ما تعرفش الصحيحة، اختلقها بذكاء)</label>
      <input type="text" id="ans" placeholder="اكتب هنا..." autocomplete="off">
      <div id="warn" style="display:none; color:var(--coral); font-size:.85rem; margin-top:8px; font-weight:700;"></div>
      <button class="btn" id="submitAns" disabled>تأكيد الإجابة</button>
    </div>
  `);
  stageEl.appendChild(card);
  const input = card.querySelector('#ans');
  const btn = card.querySelector('#submitAns');
  const warn = card.querySelector('#warn');
  input.addEventListener('input', ()=>{
    btn.disabled = input.value.trim().length===0;
    warn.style.display = 'none';
  });
  input.focus();
  function submit(){
    const v = input.value.trim();
    if(!v) return;
    if(normalizeAnswer(v) === normalizeAnswer(state.question.a)){
      warn.textContent = '🚫 هذي هي الإجابة الصحيحة بالضبط! لازم تبدّلها بكذبة، ما تنجمش تكتبها.';
      warn.style.display = 'block';
      input.select();
      return;
    }
    state.answers[playerId] = v;
    state.answerIdx++;
    if(state.answerIdx < state.answerOrder.length){
      goToPass('answer', state.answerOrder[state.answerIdx]);
    } else {
      beginVoting();
    }
  }
  btn.onclick = submit;
  input.addEventListener('keydown', e=>{ if(e.key==='Enter' && !btn.disabled){ e.preventDefault(); submit(); }});
}

/* ---------- VOTING PHASE ---------- */
function beginVoting(){
  const officialNorm = normalizeAnswer(state.question.a);
  const correctOwners = [];
  const fakes = [];
  state.players.forEach(p=>{
    const txt = state.answers[p.id];
    if(normalizeAnswer(txt) === officialNorm){
      correctOwners.push(p.id);
    } else {
      fakes.push({id:uid(), text: txt, ownerId: p.id, isCorrect:false});
    }
  });
  const correctItem = {id:uid(), text: state.question.a, ownerId:null, isCorrect:true, owners: correctOwners};
  state.revealList = shuffle([correctItem, ...fakes]);
  state.voteOrder = shuffle(state.players.map(p=>p.id));
  state.voteIdx = 0;
  state.votes = {};
  goToPass('vote', state.voteOrder[0]);
}

function viewVote(){
  const playerId = state.voteOrder[state.voteIdx];
  const player = state.players.find(p=>p.id===playerId);
  const card = el(`
    <div class="card">
      <div class="eyebrow">${player.name} — شنو في رأيك الإجابة الصحيحة؟</div>
      ${progressBar(state.voteIdx, state.voteOrder.length)}
      <div class="qbox">
        <div class="cat">${state.question.cat}</div>
        <div class="qtext">${state.question.q}</div>
      </div>
      <div id="opts"></div>
    </div>
  `);
  stageEl.appendChild(card);
  const opts = card.querySelector('#opts');
  state.revealList.forEach(item=>{
    if(item.ownerId === playerId) return; // can't vote your own lie
    if(item.isCorrect && item.owners && item.owners.includes(playerId)) return; // can't vote your own truthful answer
    const c = el(`<div class="answer-card">${item.text}</div>`);
    c.onclick = ()=>{
      state.votes[playerId] = item.id;
      state.voteIdx++;
      if(state.voteIdx < state.voteOrder.length){
        goToPass('vote', state.voteOrder[state.voteIdx]);
      } else {
        computeReveal();
      }
    };
    opts.appendChild(c);
  });
}

/* ---------- REVEAL / SCORING ---------- */
function computeReveal(){
  state.lastScores = {};
  state.players.forEach(p=> state.lastScores[p.id]=0 );

  // bonus: wrote the true answer themselves, without knowing it
  const correctItem = state.revealList.find(a=>a.isCorrect);
  if(correctItem && correctItem.owners){
    correctItem.owners.forEach(ownerId=>{
      const p = state.players.find(pp=>pp.id===ownerId);
      p.score += 2;
      state.lastScores[ownerId] += 2;
    });
  }

  // +2 for voting correct
  Object.entries(state.votes).forEach(([voterId, answerId])=>{
    const chosen = state.revealList.find(a=>a.id===answerId);
    if(chosen && chosen.isCorrect){
      const p = state.players.find(pp=>pp.id===voterId);
      p.score += 2;
      state.lastScores[voterId] += 2;
    }
  });
  // +1 to owner per vote received on their fake answer
  Object.values(state.votes).forEach(answerId=>{
    const chosen = state.revealList.find(a=>a.id===answerId);
    if(chosen && !chosen.isCorrect && chosen.ownerId){
      const owner = state.players.find(pp=>pp.id===chosen.ownerId);
      owner.score += 1;
      state.lastScores[chosen.ownerId] += 1;
    }
  });

  state.phase = 'reveal';
  render();
}

function votesFor(answerId){
  return Object.entries(state.votes).filter(([,a])=>a===answerId)
    .map(([voterId])=> state.players.find(p=>p.id===voterId).name);
}

function viewReveal(){
  const card = el(`
    <div class="card">
      <div class="eyebrow">النتيجة</div>
      <h2 class="title">${state.question.q}</h2>
      <div id="rlist"></div>
      <button class="btn" id="nextBtn" style="margin-top:18px;"></button>
    </div>
  `);
  stageEl.appendChild(card);
  const rlist = card.querySelector('#rlist');
  state.revealList.forEach((item,i)=>{
    const votes = votesFor(item.id);
    const owner = item.ownerId ? state.players.find(p=>p.id===item.ownerId) : null;
    const cls = item.isCorrect ? 'correct' : (votes.length? 'wrong-picked':'');
    const wrap = el(`<div class="answer-card ${cls}" style="animation-delay:${i*0.08}s;"></div>`);
    let meta = '';
    if(item.isCorrect){
      const selfNames = (item.owners||[]).map(id=> state.players.find(p=>p.id===id).name);
      meta = 'الإجابة الصحيحة ✓';
      if(selfNames.length) meta += ` · 🎯 ${selfNames.join('، ')} جاوب/جاوبوا صح من غير ما يقصدوا! (+2 تلقائي)`;
      meta += votes.length? ` · صوّت لها: ${votes.join('، ')} (+2 لكل واحد)`:' · محدش صوّت لها 😅';
    } else {
      meta = `كذبة ${owner.name}` + (votes.length? ` · صدّقها: ${votes.join('، ')} (+${votes.length} لـ${owner.name})` : ' · محدش انخدع بيها');
    }
    wrap.innerHTML = `<div>${item.text}</div><div class="meta">${meta}</div>`;
    rlist.appendChild(wrap);
  });

  const isLast = state.round === state.pool.length - 1;
  const nextBtn = card.querySelector('#nextBtn');
  nextBtn.textContent = isLast ? 'شوف النتيجة النهائية' : 'السؤال التالي';
  nextBtn.onclick = ()=>{
    if(isLast){ state.phase='gameover'; render(); }
    else { state.phase='scoreboard'; render(); }
  };
}

/* ---------- SCOREBOARD BETWEEN ROUNDS ---------- */
function viewScoreboard(){
  const ranked = state.players.slice().sort((a,b)=>b.score-a.score);
  const card = el(`
    <div class="card">
      <div class="eyebrow">الترتيب الحالي</div>
      <h2 class="title">قبل السؤال ${state.round+2} من ${state.pool.length}</h2>
      <div id="scores"></div>
      <button class="btn" id="cont">متابعة</button>
    </div>
  `);
  stageEl.appendChild(card);
  const scores = card.querySelector('#scores');
  ranked.forEach((p,i)=>{
    const row = el(`<div class="score-row ${i===0?'leader':''}">
      <span class="name">${i+1}. ${p.name}</span>
      <span class="pts">${p.score} ${state.lastScores[p.id]?`<span class="delta">+${state.lastScores[p.id]}</span>`:''}</span>
    </div>`);
    scores.appendChild(row);
  });
  card.querySelector('#cont').onclick = ()=>{
    state.round++;
    beginRound();
  };
}

/* ---------- GAME OVER ---------- */
function viewGameover(){
  const ranked = state.players.slice().sort((a,b)=>b.score-a.score);
  const card = el(`
    <div class="card" style="text-align:center;">
      <div class="trophy">🏆</div>
      <div class="eyebrow" style="justify-content:center;">انتهت اللعبة</div>
      <h2 class="title">أكذب واحد في المجموعة هو...</h2>
      <div id="scores" style="text-align:right;"></div>
      <button class="btn" id="again">لعبة جديدة</button>
    </div>
  `);
  stageEl.appendChild(card);
  const scores = card.querySelector('#scores');
  ranked.forEach((p,i)=>{
    const row = el(`<div class="score-row ${i===0?'leader':''}">
      <span class="name">${i+1}. ${p.name}</span>
      <span class="pts">${p.score}</span>
    </div>`);
    scores.appendChild(row);
  });
  card.querySelector('#again').onclick = ()=>{
    state = {
      phase:'setup', players: state.players.map(p=>({...p, score:0})),
      numRounds: state.numRounds, pool:[], round:0, question:null,
      answerOrder:[], answerIdx:0, answers:{}, voteOrder:[], voteIdx:0,
      votes:{}, revealList:[], pendingPhase:null, pendingPlayerId:null, lastScores:{}
    };
    render();
  };
}

const VIEWS = {
  setup: viewSetup,
  pass: viewPass,
  answer: viewAnswer,
  vote: viewVote,
  reveal: viewReveal,
  scoreboard: viewScoreboard,
  gameover: viewGameover
};

render();
</script>
</body>
</html>
